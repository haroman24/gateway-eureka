spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: empleado-service
          uri: lb://empleado-service
          predicates:
            - Path=/api/empleados/**
        - id: asistencia-service
          uri: lb://asistencia-service
          predicates:
            - Path=/api/asistencias/**
        - id: nomina-service
          uri: lb://nomina-service
          predicates:
            - Path=/api/nominas/**

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
